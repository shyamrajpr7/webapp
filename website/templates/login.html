{% extends "auth_base.html" %}
{% block title %}Sign In - FinTrack{% endblock %}
{% block content %}
<form method="POST">
    <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required/>
    </div>
    <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required/>
    </div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <label style="display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-secondary); margin-bottom:0; cursor:pointer;">
            <input type="checkbox" name="remember" style="width:auto; accent-color:var(--primary);"/>
            Remember me
        </label>
    </div>
    <button type="submit" class="btn-submit">Sign In</button>
</form>
<div class="auth-link">
    Don't have an account? <a href="{{ url_for('auth.sign_up') }}">Create one</a>
</div>
{% endblock %}
