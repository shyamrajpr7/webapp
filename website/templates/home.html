{% extends "base.html" %}
{% block title %}Home{% endblock %}
{% block content %}
<h2>Welcome, {{ user.username }}!</h2>
<p style="text-align:center; color:#555; margin-bottom:24px;">You are logged in as {{ user.email }}</p>
<a href="{{ url_for('auth.logout') }}">
    <button type="button" style="background:#d32f2f;">Logout</button>
</a>
{% endblock %}
